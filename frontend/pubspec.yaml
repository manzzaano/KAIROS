name: kairos
description: KAIROS - Asistente IA de productividad
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # HTTP & API
  dio: ^5.3.0

  # State Management
  provider: ^6.0.0

  # Navigation
  go_router: ^11.0.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.0.0
  shared_preferences: ^2.2.0

  # Typography (brutalist design system)
  google_fonts: ^6.1.0

  # Location
  geolocator: ^10.1.0

  # OAuth
  google_sign_in: ^6.2.0
  flutter_dotenv: ^6.0.1
  # sign_in_with_apple: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
